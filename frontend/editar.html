<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Ativo - Controle de Ativos de TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-diagram-3"></i> Controle de Ativos
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro.html">
                            <i class="bi bi-plus-circle"></i> Novo Ativo
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="listagem.html">
                            <i class="bi bi-list"></i> Listagem
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="form-section">
                    <h1 class="mb-4">
                        <i class="bi bi-pencil"></i> Editar Ativo
                    </h1>
                    
                    <div id="successAlert" class="alert alert-success alert-dismissible fade show d-none" role="alert">
                        <i class="bi bi-check-circle"></i>
                        <strong id="successMessage">Ativo atualizado com sucesso!</strong>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div id="errorAlert" class="alert alert-danger alert-dismissible fade show d-none" role="alert">
                        <i class="bi bi-exclamation-circle"></i>
                        <strong id="errorMessage">Erro ao atualizar ativo</strong>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div id="loadingSpinner" class="text-center mb-4">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                    </div>

                    <form id="ediçãoForm" class="d-none">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="id" class="form-label">ID</label>
                                <input type="text" class="form-control" id="id" disabled>
                            </div>
                            <div class="col-md-6">
                                <label for="numero_serie" class="form-label">Número de Série</label>
                                <input type="text" class="form-control" id="numero_serie" disabled>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="descricao" class="form-label">Descrição *</label>
                                <input type="text" class="form-control" id="descricao" required maxlength="255">
                                <div class="invalid-feedback">
                                    Descrição é obrigatória
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="status" class="form-label">Status *</label>
                                <select class="form-select" id="status" required>
                                    <option value="">-- Selecione um status --</option>
                                    <option value="Disponível">Disponível</option>
                                    <option value="Emprestado">Emprestado</option>
                                    <option value="Danificado">Danificado</option>
                                    <option value="Inativo">Inativo</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-12">
                                <label for="localizacao" class="form-label">Localização *</label>
                                <input type="text" class="form-control" id="localizacao" required maxlength="255">
                                <div class="invalid-feedback">
                                    Localização é obrigatória
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-12">
                                <label for="valor_estimado" class="form-label">Valor Estimado (R$)</label>
                                <input type="number" class="form-control" id="valor_estimado" disabled min="0" step="0.01">
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-start">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-lg"></i> Salvar Alterações
                            </button>
                            <a href="listagem.html" class="btn btn-secondary btn-lg">
                                <i class="bi bi-x-lg"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2026 Controle de Ativos de TI. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/editar.js"></script>
</body>
</html>
